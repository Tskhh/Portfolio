<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Parallax Forest — учебный проект с многослойным parallax-эффектом.">
	<title>Parallax Forest — учебный проект</title>
	<link rel="stylesheet" href="main.css">
	<link rel="stylesheet" href="../css/project-back.css">
	<link rel="stylesheet" href="../css/project-lite.css">
	<script src="../js/project-lite.js"></script>
	<script>
	(function () {
		const mobile = window.matchMedia('(max-width: 768px)').matches
		const files = mobile
			? ['app.js']
			: ['gsap/gsap.min.js', 'gsap/ScrollTrigger.min.js', 'gsap/ScrollSmoother.min.js', 'app.js']
		files.forEach((src) => {
			const s = document.createElement('script')
			s.src = src
			s.defer = true
			document.head.appendChild(s)
		})
	})()
	</script>
</head>
<body>

	<a href="../portfolio.html" class="project-back">К портфолио</a>

	<div class="wrapper">
		<div class="content">
			<header class="main-header">
				<div class="layers">
					<div class="layer_header">
						<div class="layers_caption">Добро пожаловать</div>
						<div class="layers_title">Волшебный лес</div>
					</div>
					<div class="layer layers_base" style="background-image: url(img_2/layer-base.png);"></div>
					<div class="layer layers_middle" style="background-image: url(img_2/layer-middle.png);"></div>
					<div class="layer layers_front" style="background-image: url(img_2/layer-front.png);"></div>
				</div>
			</header>

			<article class="main-article" style="background-image: url(img_2/dungeon.jpg);">
				<div class="main-article_content">
					<h2 class="main-article_header">Parallax при скролле</h2>
					<p class="main-article_paragraph">Учебный проект с многослойным parallax-эффектом. На десктопе — GSAP ScrollSmoother, на мобильных — облегчённая CSS-версия.</p>
				</div>
				<div class="copy">© 2026 Егор Толстых · Учебный проект</div>
			</article>
		</div>
	</div>

</body>
</html>
