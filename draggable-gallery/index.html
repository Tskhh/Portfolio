	<link rel="stylesheet" href="/css/project-lite.css">
	<script src="/js/project-lite.js"></script>
	<script>
	(function () {
		const mobile = window.matchMedia('(max-width: 1024px)').matches ||
			window.matchMedia('(hover: none) and (pointer: coarse)').matches
		if (!mobile) {
			['libs/gsap.min.js', 'libs/Draggable.min.js', 'libs/InertiaPlugin.min.js'].forEach((src) => {
				const s = document.createElement('script')
				s.src = src
				s.defer = true
				document.head.appendChild(s)
			})
		}
		const app = document.createElement('script')
		app.src = 'js/app.js'
		app.defer = true
		document.head.appendChild(app)
	})()
	</script>
	<style>
		.gallery { opacity: 0; }
	</style>
